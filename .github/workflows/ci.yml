name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test-release:
    name: Build, Test, Release Build
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift Version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Build Release
        run: swift build -c release
